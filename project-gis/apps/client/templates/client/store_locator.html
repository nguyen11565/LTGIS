{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tìm cửa hàng gần nhất</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 500px; width: 100%; border-radius: 10px; }
        .store-item { cursor: pointer; transition: all 0.2s; }
        .store-item:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h2 class="text-center mb-4 text-uppercase fw-bold">Hệ thống cửa hàng</h2>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Kết quả tìm kiếm</h5>
                    </div>
                    <div class="list-group list-group-flush overflow-auto" style="max-height: 500px;" id="store-list-container">
                        </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="map" class="shadow border border-2"></div>
            </div>
        </div>
        
        <div class="text-center mt-4 d-flex justify-content-center gap-3">
            <a href="{% url 'client:home' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Quay lại trang chủ
            </a>
            
            <a id="btn-nearest-store" href="#" target="_blank" class="btn btn-success">
                <i class="fas fa-directions"></i> Chỉ đường đến cửa hàng gần nhất
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const stores = {{ stores_json|safe }};
        const userLat = {{ user_lat }};
        const userLon = {{ user_lon }};

        // 1. Khởi tạo bản đồ
        var map = L.map('map').setView([userLat, userLon], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 2. Icon Người dùng
        var userIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/markers/marker-icon-2x-red.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });
        L.marker([userLat, userLon], {icon: userIcon}).addTo(map).bindPopup("<b>Vị trí của bạn</b>").openPopup();

        // 3. Xử lý danh sách cửa hàng
        const listContainer = document.getElementById('store-list-container');
        const btnNearest = document.getElementById('btn-nearest-store');

        // Nếu có ít nhất 1 cửa hàng, cập nhật nút "Gần nhất"
        if (stores.length > 0) {
            const nearest = stores[0];
            // Tạo link Google Maps: từ vị trí user -> cửa hàng
            const googleMapUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${nearest.lat},${nearest.lon}`;
            btnNearest.href = googleMapUrl;
        } else {
            btnNearest.classList.add('disabled');
        }

        // 4. Vòng lặp hiển thị từng cửa hàng
        stores.forEach((store, index) => {
            // Tạo link Google Maps cho từng cửa hàng
            const gMapLink = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${store.lat},${store.lon}`;

            // Thêm Marker
            const marker = L.marker([store.lat, store.lon]).addTo(map);
            marker.bindPopup(`
                <b>${store.name}</b><br>
                ${store.address}<br>
                Khoảng cách: <b>${store.distance} km</b><br>
                <a href="${gMapLink}" target="_blank" class="text-primary fw-bold">Xem chỉ đường Google Maps</a>
            `);

            // Thêm vào danh sách bên trái
            const item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action store-item p-3';
            item.innerHTML = `
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <h6 class="mb-1 fw-bold text-primary">${index + 1}. ${store.name}</h6>
                    <span class="badge bg-danger rounded-pill">${store.distance} km</span>
                </div>
                <p class="mb-2 small text-muted"><i class="fas fa-map-marker-alt"></i> ${store.address}</p>
                <div class="d-grid gap-2">
                     <a href="${gMapLink}" target="_blank" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-directions"></i> Chỉ đường ngay
                     </a>
                </div>
            `;
            
            // Click vào item thì zoom bản đồ
            item.onclick = function(e) {
                // Ngăn không cho click vào nút chỉ đường bị tính là click vào item
                if (e.target.tagName !== 'A' && e.target.tagName !== 'I') {
                    map.flyTo([store.lat, store.lon], 16);
                    marker.openPopup();
                }
            };
            listContainer.appendChild(item);
        });
    </script>
</body>
</html>
