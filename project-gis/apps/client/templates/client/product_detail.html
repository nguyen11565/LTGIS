{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'client/css/style.css' %}" />
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <a href="{% url 'client:home' %}" class="btn btn-outline-light mb-4">← Quay lại</a>
        
        <div class="row">
            <div class="col-md-6 text-center">
                {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded shadow" alt="{{ product.name }}">
                {% else %}
                <img src="https://via.placeholder.com/500" class="img-fluid rounded" alt="No image">
                {% endif %}
            </div>
            <div class="col-md-6">
                <h1 class="fw-bold">{{ product.name }}</h1>
                <h3 class="text-danger fw-bold my-3">{{ product.price|floatformat:0 }}₫</h3>
                <p class="text-secondary">{{ product.description|linebreaks }}</p>
                
                <hr class="border-secondary">
                
                <a href="{% url 'client:cart_add' product.id %}" class="btn btn-primary btn-lg w-100">
                    Thêm vào giỏ hàng
                </a>
            </div>
        </div>
    </div>
</body>
</html>
