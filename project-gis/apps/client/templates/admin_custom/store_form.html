{% extends 'admin_custom/base_admin.html' %}

{% block admin_content %}
<div class="container">
    <form method="POST" enctype="multipart/form-data"> {% csrf_token %}
        <div class="row">
            <div class="col-md-5">
                <div class="card p-3 shadow-sm border-0">
<h5 class="fw-bold mb-3 text-uppercase" style="letter-spacing: 1px;">
    {% if store %}<i class="fas fa-edit me-2"></i>Sửa{% else %}<i class="fas fa-plus-circle me-2"></i>Thêm{% endif %} chi nhánh
</h5>
                    
                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Tên cửa hàng</label>
                        <input type="text" name="name" class="form-control" value="{{ store.name }}" required placeholder="Ví dụ: Phone Store Quận 1">
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Địa chỉ</label>
                        <input type="text" name="address" id="id_address" class="form-control" value="{{ store.address }}" required placeholder="Click bản đồ để lấy địa chỉ tự động">
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="small fw-bold text-secondary">Vĩ độ (Lat)</label>
                            <input type="text" name="latitude" id="id_latitude" class="form-control bg-light" value="{{ store.latitude }}" readonly required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="small fw-bold text-secondary">Kinh độ (Lon)</label>
                            <input type="text" name="longitude" id="id_longitude" class="form-control bg-light" value="{{ store.longitude }}" readonly required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Ảnh cửa hàng</label>
                        <input type="file" name="image" class="form-control">
                        {% if store.image %}
                            <img src="{{ store.image.url }}" class="img-thumbnail mt-2" style="height: 100px;">
                        {% endif %}
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2 py-2 fw-bold">
                        <i class="fas fa-save me-2"></i>LƯU DỮ LIỆU
                    </button>
                    <a href="{% url 'client:admin_store_list' %}" class="btn btn-link w-100 btn-sm text-decoration-none text-muted mt-2">Hủy bỏ</a>
                </div>
            </div>

            <div class="col-md-7">
                <div id="admin-map" style="height: 550px;" class="rounded-4 shadow-sm border"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-info-subtle text-info border border-info-subtle px-3 py-2 rounded-pill small">
                        <i class="fas fa-mouse-pointer me-1"></i> Click vào bản đồ để lấy tọa độ và địa chỉ tự động
                    </span>
                </div>
            </div>
        </div>
    </form>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>



<script>
    // 1. Khởi tạo tọa độ mặc định (Hồ Chí Minh)
    var defaultLat = {{ store.latitude|default:10.7725 }};
    var defaultLon = {{ store.longitude|default:106.6980 }};
    
    var map = L.map('admin-map').setView([defaultLat, defaultLon], 15);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker = L.marker([defaultLat, defaultLon]).addTo(map);

    // 2. Xử lý sự kiện Click
    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lon = e.latlng.lng;

        // Cập nhật Marker và Input tọa độ
        marker.setLatLng(e.latlng);
        document.getElementById('id_latitude').value = lat.toFixed(6);
        document.getElementById('id_longitude').value = lon.toFixed(6);

        // 3. Gọi API Nominatim để lấy địa chỉ (Reverse Geocoding)
        var addressInput = document.getElementById('id_address');
        addressInput.value = "Đang lấy địa chỉ...";

        fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=vi`)
            .then(response => response.json())
            .then(data => {
                if (data.display_name) {
                    // Cập nhật ô địa chỉ
                    addressInput.value = data.display_name;
                } else {
                    addressInput.value = "Không tìm thấy địa chỉ tại vị trí này.";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                addressInput.value = "Lỗi kết nối máy chủ địa chỉ.";
            });
    });
</script>
{% endblock %}
